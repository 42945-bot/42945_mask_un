<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine AI Dashboard</title>
    <!-- นำเข้า Tailwind CSS เพื่อช่วยจัดการความสวยงามแบบ Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        /* ซ่อน Canvas ดั้งเดิมเพื่อให้เราสามารถนำไปวาดใหม่ในสไตล์ที่สวยขึ้นได้ */
        #webcam-container canvas {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-100">

    <div class="max-w-4xl w-full bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-3xl p-6 md:p-8 shadow-2xl flex flex-col md:flex-row gap-8">
        
        <!-- ฝั่งซ้าย: หน้าจอ Webcam และปุ่มควบคุม -->
        <div class="flex-1 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-800 pb-6 md:pb-0 md:pr-8">
            <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent mb-2">
                Teachable Machine
            </h1>
            <p class="text-sm text-slate-400 text-center mb-6">ระบบวิเคราะห์ภาพด้วย AI ทำงานอัตโนมัติทุกๆ 3 วินาที</p>
            
            <!-- กรอบแสดงผลกล้องกลมมนสไตล์กระจก -->
            <div class="relative w-64 h-64 rounded-2xl overflow-hidden bg-slate-950 border-2 border-slate-700 shadow-inner flex items-center justify-center group mb-6">
                <!-- วงแหวนสถานะการทำงาน (จะกะพริบเวลารัน) -->
                <div id="status-ring" class="absolute inset-0 border-4 border-transparent rounded-2xl transition-all duration-300 pointer-events-none z-10"></div>
                
                <div id="webcam-placeholder" class="text-slate-500 flex flex-col items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <span class="text-xs">กล้องยังไม่ได้เปิด</span>
                </div>
                <!-- Container สำหรับดึงค่าจากระบบกล้องดั้งเดิมมาแปะไว้ -->
                <div id="webcam-container" class="w-full h-full transform scale-x-[-1]"></div> 
            </div>

            <button type="button" onclick="init()" id="btn-start" class="w-full max-w-xs bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-blue-500/20 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                เริ่มเปิดกล้องวิเคราะห์ภาพ
            </button>
        </div>

        <!-- ฝั่งขวา: ผลลัพธ์การทำนายและ Countdown Bar -->
        <div class="flex-1 flex flex-col justify-between py-2">
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-slate-300 flex items-center gap-2">
                        <span class="flex h-2 w-2 relative">
                            <span id="pulse-dot" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-500 opacity-75"></span>
                            <span id="status-dot" class="relative inline-flex rounded-full h-2 w-2 bg-slate-500"></span>
                        </span>
                        ผลการวิเคราะห์ภาพ (AI Result)
                    </h2>
                    <!-- เลเบลบอกเวลาถอยหลังถัดไป -->
                    <span id="countdown-text" class="text-xs bg-slate-800 text-slate-400 px-2.5 py-1 rounded-md font-mono border border-slate-700/50">
                        Status: Standby
                    </span>
                </div>

                <!-- Progress Bar นับถอยหลัง 3 วินาทีแบบเนียนตา -->
                <div class="w-full bg-slate-950 h-1.5 rounded-full mb-6 overflow-hidden border border-slate-800">
                    <div id="progress-bar" class="bg-gradient-to-r from-cyan-500 to-blue-500 h-full w-0 transition-all duration-100 ease-linear"></div>
                </div>

                <!-- กล่องแสดงผลลัพธ์รายชื่อ Classes -->
                <div id="label-container" class="space-y-3">
                    <div class="text-center text-slate-500 py-8 text-sm border border-dashed border-slate-800 rounded-xl">
                        ยังไม่มีข้อมูลการวิเคราะห์ กรุณากดปุ่มเปิดกล้องด้านซ้าย
                    </div>
                </div>
            </div>

            <!-- Footer เล็กๆ ด้านล่าง -->
            <div class="mt-6 pt-4 border-t border-slate-800 text-xs text-slate-500 flex justify-between items-center">
                <span>Model Ref: gL9AkhX8ul[cite: 1]</span>
                <span>Interval: 3.0s</span>
            </div>
        </div>

    </div>

    <!-- ส่วนของ Scripts ตัวเชื่อมระบบต้นฉบับ -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>[cite: 1]
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>[cite: 1]
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/gL9AkhX8ul/";[cite: 1]

        let model, webcam, labelContainer, maxPredictions;
        let predictInterval;
        let countdownTimer;
        let timeLeft = 3000; // 3 วินาที (3000 มิลลิวินาที)

        async function init() {
            // ปรับแต่ง UI เมื่อกดเริ่ม
            const btnStart = document.getElementById("btn-start");
            btnStart.disabled = true;
            btnStart.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังโหลด AI...`;

            const modelURL = URL + "model.json";[cite: 1]
            const metadataURL = URL + "metadata.json";[cite: 1]

            model = await tmImage.load(modelURL, metadataURL);[cite: 1]
            maxPredictions = model.getTotalClasses();[cite: 1]

            const flip = true;[cite: 1]
            // เปลี่ยนขนาดการเรนเดอร์ให้เต็มกล่องครอบ
            webcam = new tmImage.Webcam(256, 256, flip);[cite: 1]
            await webcam.setup();[cite: 1]
            await webcam.play();[cite: 1]
            
            // เริ่มลูปอัปเดตหน้าภาพวิดีโอสด (ไหลลื่น 60fps ปกติเพื่อไม่ให้กล้องกระตุก)
            window.requestAnimationFrame(loop);[cite: 1]

            // เคลียร์ UI ส่วน Placeholder เดิมทิ้ง
            document.getElementById("webcam-placeholder").style.display = 'none';
            const webcamContainer = document.getElementById("webcam-container");
            webcamContainer.innerHTML = '';
            
            // นำวิดีโอจากเว็บแคมมาแสดงผลจริง
            const canvasElement = webcam.canvas;
            canvasElement.style.display = "block";
            canvasElement.style.width = "100%";
            canvasElement.style.height = "100%";
            canvasElement.style.objectFit = "cover";
            webcamContainer.appendChild(canvasElement);[cite: 1]

            // อัปเดตสไตล์สถานะ
            document.getElementById("status-dot").className = "relative inline-flex rounded-full h-2 w-2 bg-emerald-500";
            document.getElementById("pulse-dot").className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
            document.getElementById("status-ring").className = "absolute inset-0 border-4 border-emerald-500/30 rounded-2xl transition-all duration-300 pointer-events-none z-10";

            // สร้างโครงสร้างหน้าตา Progress/Label สวยๆ มารองรับผลทำนาย
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            for (let i = 0; i < maxPredictions; i++) {[cite: 1]
                const div = document.createElement("div");
                div.className = "bg-slate-950/50 border border-slate-800/80 p-3 rounded-xl flex flex-col gap-1.5";
                div.innerHTML = `
                    <div class="flex justify-between items-center text-sm">
                        <span id="class-name-${i}" class="font-medium text-slate-300">กำลังโหลด...</span>
                        <span id="class-perc-${i}" class="font-mono text-xs font-semibold text-cyan-400">0.0%</span>
                    </div>
                    <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                        <div id="class-bar-${i}" class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full w-0 transition-all duration-500"></div>
                    </div>
                `;
                labelContainer.appendChild(div);[cite: 1]
            }

            // ซ่อนปุ่มเปิดกล้องเมื่อรันเรียบร้อยแล้ว
            btnStart.className = "hidden";

            // สั่งทำนายผลครั้งแรกทันที
            predict();

            // เริ่มตั้งเวลานับถอยหลังและวิเคราะห์ผลลัพธ์ใหม่ "ทุกๆ 3 วินาที (3000ms)"
            startCustomInterval();
        }

        async function loop() {
            webcam.update(); // คอยสตรีมภาพสดมาที่หน้าจอปกติ (ไม่กระตุก)[cite: 1]
            window.requestAnimationFrame(loop);[cite: 1]
        }

        // จัดการลูปเวลาและการแสดงผลแท่งบาร์นับถอยหลัง 3 วินาทีให้เนียนตา
        function startCustomInterval() {
            const intervalTime = 3000; // 3 วินาที
            const updateVisualRate = 100; // อัปเดตความยาวแท่งแถบวิ่งทุกๆ 100ms
            let elapsed = 0;

            // เคลียร์วงรอบเก่า (ถ้ามีป้องกันการรันซ้อน)
            clearInterval(predictInterval);
            clearInterval(countdownTimer);

            countdownTimer = setInterval(() => {
                elapsed += updateVisualRate;
                let percentage = (elapsed / intervalTime) * 100;
                
                // อัปเดตแท่งแถบวิ่งนับถอยหลัง 3 วินาที
                document.getElementById("progress-bar").style.width = `${percentage}%`;
                
                // คำนวณเป็นวินาทีแสดงผลข้อความด้านบนตัวเลขหลักหน่วยนิ่งๆ
                let secondsLeft = ((intervalTime - elapsed) / 1000).toFixed(1);
                document.getElementById("countdown-text").innerText = `Next Scan: ${secondsLeft}s`;

                if (elapsed >= intervalTime) {
                    elapsed = 0; // รีเซ็ตตัวนับรอบใหม่เมื่อครบ 3 วินาที
                    predict(); // เรียกฟังก์ชันประมวลผลวิเคราะห์วัตถุจาก AI
                    
                    // เอฟเฟกต์ไฟกะพริบที่กรอบตอนแสกนสำเร็จ
                    const ring = document.getElementById("status-ring");
                    ring.classList.replace("border-emerald-500/30", "border-cyan-400");
                    setTimeout(() => {
                        ring.classList.replace("border-cyan-400", "border-emerald-500/30");
                    }, 200);
                }
            }, updateVisualRate);
        }

        // ฟังก์ชันส่งภาพไปประมวลผลกับชุดข้อมูลโมเดล AI
        async function predict() {
            if (!model) return;
            
            const prediction = await model.predict(webcam.canvas);[cite: 1]
            for (let i = 0; i < maxPredictions; i++) {[cite: 1]
                const className = prediction[i].className;
                const probability = prediction[i].probability; // ค่าสัดส่วน 0.00 - 1.00[cite: 1]
                const percentageStr = (probability * 100).toFixed(1) + "%";[cite: 1]

                // แสดงข้อมูลลงในโครงสร้าง UI ชิ้นประกอบที่เราเตรียมไว้
                document.getElementById(`class-name-${i}`).innerText = className;
                document.getElementById(`class-perc-${i}`).innerText = percentageStr;
                document.getElementById(`class-bar-${i}`).style.width = percentageStr;
            }
        }
    </script>
</body>
</html>
