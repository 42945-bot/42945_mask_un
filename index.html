<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        #webcam-container canvas {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-100">

    <div class="max-w-4xl w-full bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-3xl p-6 md:p-8 shadow-2xl flex flex-col md:flex-row gap-8">
        
        <!-- ฝั่งซ้าย: หน้าจอ Webcam -->
        <div class="flex-1 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-slate-800 pb-6 md:pb-0 md:pr-8">
            <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent mb-2">
                Teachable Machine
            </h1>
            <p class="text-sm text-slate-400 text-center mb-6">ระบบวิเคราะห์ภาพด้วย AI ทำงานอัตโนมัติทุกๆ 3 วินาที</p>
            
            <div class="relative w-64 h-64 rounded-2xl overflow-hidden bg-slate-950 border-2 border-slate-700 shadow-inner flex items-center justify-center mb-6">
                <div id="status-ring" class="absolute inset-0 border-4 border-transparent rounded-2xl transition-all duration-300 pointer-events-none z-10"></div>
                
                <div id="webcam-placeholder" class="text-slate-500 flex flex-col items-center gap-2 p-4 text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <span class="text-xs">กล้องยังไม่ได้เปิด หรือรอการอนุญาตสิทธิ์</span>
                </div>
                <div id="webcam-container" class="w-full h-full transform scale-x-[-1]"></div> 
            </div>

            <button type="button" onclick="init()" id="btn-start" class="w-full max-w-xs bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-blue-500/20 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 flex items-center justify-center gap-2">
                เริ่มเปิดกล้องวิเคราะห์ภาพ
            </button>
        </div>

        <!-- ฝั่งขวา: ผลลัพธ์การทำนาย -->
        <div class="flex-1 flex flex-col justify-between py-2">
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-slate-300 flex items-center gap-2">
                        <span class="flex h-2 w-2 relative">
                            <span id="pulse-dot" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-500 opacity-75"></span>
                            <span id="status-dot" class="relative inline-flex rounded-full h-2 w-2 bg-slate-500"></span>
                        </span>
                        ผลการวิเคราะห์ภาพ (AI Result)
                    </h2>
                    <span id="countdown-text" class="text-xs bg-slate-800 text-slate-400 px-2.5 py-1 rounded-md font-mono border border-slate-700/50">
                        Status: Standby
                    </span>
                </div>

                <div class="w-full bg-slate-950 h-1.5 rounded-full mb-6 overflow-hidden border border-slate-800">
                    <div id="progress-bar" class="bg-gradient-to-r from-cyan-500 to-blue-500 h-full w-0 transition-all duration-100 ease-linear"></div>
                </div>

                <div id="label-container" class="space-y-3">
                    <div class="text-center text-slate-500 py-8 text-sm border border-dashed border-slate-800 rounded-xl">
                        ยังไม่มีข้อมูลการวิเคราะห์ กรุณากดปุ่มเปิดกล้องด้านซ้าย
                    </div>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-800 text-xs text-slate-500 flex justify-between items-center">
                <span>Model ID: gL9AkhX8ul</span>
                <span>Interval: 3.0s</span>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/gL9AkhX8ul/";

        let model, webcam, labelContainer, maxPredictions;
        let countdownTimer;

        async function init() {
            const btnStart = document.getElementById("btn-start");
            btnStart.disabled = true;
            btnStart.innerHTML = `กำลังโหลด AI...`;

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true;
                webcam = new tmImage.Webcam(256, 256, flip);
                
                // บังคับขอสิทธิ์กล้องหน้า/เว็บแคม
                await webcam.setup(); 
                await webcam.play();
                
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-placeholder").style.display = 'none';
                const webcamContainer = document.getElementById("webcam-container");
                webcamContainer.innerHTML = '';
                
                const canvasElement = webcam.canvas;
                canvasElement.style.display = "block";
                canvasElement.style.width = "100%";
                canvasElement.style.height = "100%";
                canvasElement.style.objectFit = "cover";
                webcamContainer.appendChild(canvasElement);

                document.getElementById("status-dot").className = "relative inline-flex rounded-full h-2 w-2 bg-emerald-500";
                document.getElementById("pulse-dot").className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
                document.getElementById("status-ring").className = "absolute inset-0 border-4 border-emerald-500/30 rounded-2xl pointer-events-none z-10";

                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; 
                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement("div");
                    div.className = "bg-slate-950/50 border border-slate-800/80 p-3 rounded-xl flex flex-col gap-1.5";
                    div.innerHTML = `
                        <div class="flex justify-between items-center text-sm">
                            <span id="class-name-${i}" class="font-medium text-slate-300">กำลังรอสแกน...</span>
                            <span id="class-perc-${i}" class="font-mono text-xs font-semibold text-cyan-400">0.0%</span>
                        </div>
                        <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                            <div id="class-bar-${i}" class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full w-0 transition-all duration-500"></div>
                        </div>
                    `;
                    labelContainer.appendChild(div);
                }

                btnStart.className = "hidden";
                predict();
                startCustomInterval();

            } catch (error) {
                console.error("Camera Access Error:", error);
                alert("ไม่สามารถเปิดกล้องได้!\n\nวิธีแก้ไข:\n1. ตรวจสอบว่าเว็บของคุณใช้ 'https://' หรือไม่\n2. คลิกไอคอนรูปกล้องหรือแม่กุญแจที่ URL bar ด้านบนเพื่อกด 'Allow' อนุญาตให้เว็บเข้าถึงกล้อง");
                btnStart.disabled = false;
                btnStart.innerHTML = "ลองใหม่อีกครั้ง";
            }
        }

        async function loop() {
            webcam.update(); 
            window.requestAnimationFrame(loop);
        }

        function startCustomInterval() {
            const intervalTime = 3000; 
            const updateVisualRate = 100; 
            let elapsed = 0;

            clearInterval(countdownTimer);

            countdownTimer = setInterval(() => {
                elapsed += updateVisualRate;
                let percentage = (elapsed / intervalTime) * 100;
                
                document.getElementById("progress-bar").style.width = `${percentage}%`;
                
                let secondsLeft = ((intervalTime - elapsed) / 1000).toFixed(1);
                document.getElementById("countdown-text").innerText = `Next Scan: ${secondsLeft}s`;

                if (elapsed >= intervalTime) {
                    elapsed = 0; 
                    predict(); 
                    
                    const ring = document.getElementById("status-ring");
                    ring.classList.replace("border-emerald-500/30", "border-cyan-400");
                    setTimeout(() => {
                        ring.classList.replace("border-cyan-400", "border-emerald-500/30");
                    }, 200);
                }
            }, updateVisualRate);
        }

        async function predict() {
            if (!model) return;
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability; 
                const percentageStr = (probability * 100).toFixed(1) + "%";

                document.getElementById(`class-name-${i}`).innerText = className;
                document.getElementById(`class-perc-${i}`).innerText = percentageStr;
                document.getElementById(`class-bar-${i}`).style.width = percentageStr;
            }
        }
    </script>
</body>
</html>
